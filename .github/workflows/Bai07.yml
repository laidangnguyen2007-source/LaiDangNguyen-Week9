name: Bai07 Pipeline

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  checkstyle:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Run Checkstyle
      run: mvn -f Bai07/pom.xml checkstyle:checkstyle
      continue-on-error: true
        
    - name: Run Reviewdog (Inline Bot Comments)
      uses: reviewdog/action-checkstyle@v1
      with:
        github_token: ${{ secrets.github_token }}
        reporter: github-pr-review
        checkstyle_config: Bai07/google_checks.xml # Reviewdog sẽ tự dùng file kết quả xml
        xml_path: Bai07/target/checkstyle-result.xml
        level: warning